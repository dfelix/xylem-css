<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Xylem CSS Example</title>
  <link rel="icon" type="image/svg+xml" href="../assets/logo.svg">
  <link rel="stylesheet" href="../dist/xylem.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css">
  <style>
    #theme-toggle { border-color: transparent; position: fixed; top: 1rem; right: 1rem; z-index: 10; }
    /* Login-specific layout */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--xy-space-3);
      background: var(--xy-color-bg-subtle);
    }

    .login-card {
      width: 100%;
      max-width: 24rem;
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--xy-space-2);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--xy-color-text);
    }


    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--xy-space-2);
      width: 100%;
      padding: 0.6rem;
      font-size: var(--xy-text-sm);
      text-transform: none;
      letter-spacing: 0;
      font-weight: 500;
    }

    .login-footer {
      text-align: center;
      font-size: var(--xy-text-sm);
      color: var(--xy-color-muted);
    }
  </style>
</head>
<body>

  <button id="theme-toggle" class="button button-sm" aria-label="Toggle dark mode"><i class="ph ph-moon"></i></button>
  <div class="login-page">
    <div class="stack login-card">

      <!-- Logo -->
      <div class="login-logo">
        <img src="../assets/logo.svg" alt="Roots" height="32"> Roots
      </div>

      <!-- Login card -->
      <div class="card card-shadow">
        <div class="card-body stack">
          <div class="text-center">
            <h2 class="m-0">Welcome back</h2>
            <p class="text-sm text-muted">Sign in to your account to continue</p>
          </div>

          <!-- Social login -->
          <div class="stack-sm">
            <button class="button social-btn m-0">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path><path d="M9 18c-4.51 2-5-2-7-2"></path></svg>
              Continue with GitHub
            </button>
            <button class="button social-btn m-0">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M2 12h20"></path><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
              Continue with Google
            </button>
          </div>

          <div class="divider">or</div>

          <!-- Email login form -->
          <form class="stack-sm" onsubmit="return false;">
            <div class="stack-sm">
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="you@example.com" class="w-full" required>
            </div>
            <div class="stack-sm">
              <div class="row row-between">
                <label for="password">Password</label>
                <a href="#" class="text-sm">Forgot password?</a>
              </div>
              <input type="password" id="password" placeholder="Enter your password" class="w-full" required>
            </div>
            <label>
              <input type="checkbox"> Remember me
            </label>
            <button type="submit" class="button button-primary w-full m-0">Sign in</button>
          </form>
        </div>
      </div>

      <!-- Sign up link -->
      <div class="login-footer">
        Don't have an account? <a href="#">Create one</a>
      </div>

      <!-- Register card (alternative view) -->
      <div class="card card-shadow mt-3">
        <div class="card-body stack">
          <div class="text-center">
            <h2 class="m-0">Create an account</h2>
            <p class="text-sm text-muted">Start your free 14-day trial</p>
          </div>

          <form class="stack-sm" onsubmit="return false;">
            <div class="row">
              <div class="stack-sm flex-1">
                <label for="first-name">First name</label>
                <input type="text" id="first-name" placeholder="Ana" class="w-full" required>
              </div>
              <div class="stack-sm flex-1">
                <label for="last-name">Last name</label>
                <input type="text" id="last-name" placeholder="Moreira" class="w-full" required>
              </div>
            </div>
            <div class="stack-sm">
              <label for="reg-email">Email</label>
              <input type="email" id="reg-email" placeholder="you@example.com" class="w-full" required>
            </div>
            <div class="stack-sm">
              <label for="reg-password">Password</label>
              <input type="password" id="reg-password" placeholder="At least 8 characters" class="w-full" required>
            </div>
            <div class="stack-sm">
              <label for="farm-size">Farm size</label>
              <select id="farm-size" class="w-full">
                <option value="">Select a plan</option>
                <option>Smallholder (up to 50 ha)</option>
                <option>Professional (up to 500 ha)</option>
                <option>Estate (unlimited)</option>
              </select>
            </div>
            <label>
              <input type="checkbox" required> I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
            </label>
            <button type="submit" class="button button-primary w-full m-0">Create account</button>
          </form>
        </div>
      </div>

      <div class="login-footer">
        Already have an account? <a href="#">Sign in</a>
      </div>

    </div>
  </div>

  <script>
    (function () {
      var toggle = document.getElementById('theme-toggle');
      var icon = toggle.querySelector('i');
      var saved = localStorage.getItem('theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        icon.className = 'ph ph-sun';
      }
      toggle.addEventListener('click', function () {
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (isDark) {
          document.documentElement.setAttribute('data-theme', 'light');
          icon.className = 'ph ph-moon';
          localStorage.setItem('theme', 'light');
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
          icon.className = 'ph ph-sun';
          localStorage.setItem('theme', 'dark');
        }
      });
    })();
  </script>
</body>
</html>
